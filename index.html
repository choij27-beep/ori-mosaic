<style>
:root{
  --lacquer:#12100e;
  --lacquer-2:#1b1713;
  --panel:#211b15;
  --gold:#c8a24d;
  --gold-hi:#eccf85;
  --gold-dim:#8a6f38;
  --washi:#f2e7d2;
  --washi-dim:#c9bda4;
  --enji:#8e2c33;
  --kon:#232f4b;
  --display:'Shippori Mincho', 'Hiragino Mincho ProN', serif;
  --body:'Zen Kaku Gothic New', 'Hiragino Kaku Gothic ProN', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  background:var(--lacquer);
  color:var(--washi);
  font-family:var(--body);
  line-height:1.8;
  overflow-x:hidden;
  font-size:17.5px;
}
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(200,162,77,.05), transparent 55%),
    radial-gradient(ellipse at 50% 115%, rgba(142,44,51,.07), transparent 60%);
}
#flecks{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.fleck{
  position:absolute;background:linear-gradient(135deg,var(--gold-hi),var(--gold-dim));
  opacity:.55;border-radius:30% 70% 60% 40%;
  box-shadow:0 0 6px rgba(232,207,133,.25);
}
@media (prefers-reduced-motion: no-preference){
  .fleck{animation:glint 7s ease-in-out infinite}
  @keyframes glint{0%,100%{opacity:.35}50%{opacity:.7}}
}

/* dual-language rendering: Japanese primary, English beneath */
.en-sub{
  display:block;color:#b0a48e;font-size:.84em;font-family:var(--body);
  font-weight:400;letter-spacing:.02em;margin-top:4px;line-height:1.6;
}
#intro h1 .en-sub{font-size:18px;letter-spacing:.05em;margin-top:14px}
.q-text .en-sub{font-size:16px;margin-top:10px}
.fact .en-sub{margin-top:10px}
.name-en{font-family:var(--display);color:#b0a48e;font-size:17px;letter-spacing:.12em;margin-top:6px}

/* "your choice" echo on the fact page */
.choice-echo{
  border:1px solid #3a3021;border-radius:8px;padding:12px 16px;margin:12px 0 16px;
  background:#171209;font-size:14px;color:var(--washi);
}
.choice-echo .lbl{
  font-family:var(--display);font-size:11px;letter-spacing:.26em;color:var(--gold);
  display:block;margin-bottom:6px;
}
.choice-echo .rx{color:var(--gold-hi);font-family:var(--display);display:block;margin-top:10px;font-size:15px}

/* saved-card overlay (long-press / right-click to save) */
.overlay{
  position:fixed;inset:0;z-index:50;background:rgba(10,8,6,.92);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:20px;gap:16px;
}
.overlay img{
  max-width:min(86vw,420px);max-height:62vh;border:1px solid var(--gold);
  border-radius:10px;box-shadow:0 20px 60px rgba(0,0,0,.7);
}
.overlay .cap{color:#c0b498;font-size:14.5px;text-align:center;max-width:48ch;line-height:1.75}
.overlay .row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.overlay .btn-gold{margin-top:0;text-decoration:none;display:inline-block}

.stage{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:56px 20px 80px}
.screen{display:none;animation:rise .5s ease both}
.screen.on{display:block}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion: reduce){.screen{animation:none}.fleck{animation:none}}

/* ---------- shared card frame ---------- */
.frame{
  border:1px solid var(--gold-dim);
  outline:1px solid rgba(200,162,77,.25);
  outline-offset:4px;
  background:linear-gradient(160deg,var(--panel),var(--lacquer-2) 70%);
  border-radius:10px;
  padding:26px 24px;
  position:relative;
}
.frame::before,.frame::after{content:"◆";color:var(--gold-dim);font-size:9px;position:absolute}
.frame::before{top:8px;left:10px}
.frame::after{bottom:8px;right:10px}
.eyebrow{
  font-family:var(--display);letter-spacing:.35em;font-size:11px;
  color:var(--gold);text-transform:uppercase;margin-bottom:10px;
}
h1,h2,h3{font-family:var(--display);font-weight:700;color:var(--washi)}

/* ---------- intro ---------- */
#intro{text-align:center;padding-top:2vh}
.mon{
  width:92px;height:92px;margin:0 auto 18px;border-radius:50%;
  border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;
  font-family:var(--display);font-size:44px;color:var(--gold-hi);
  background:radial-gradient(circle at 35% 30%, #2a2118, #14100b);
  box-shadow:0 0 0 5px rgba(200,162,77,.12), 0 8px 30px rgba(0,0,0,.6);
}
.jp-line{font-family:var(--display);color:var(--gold);letter-spacing:.28em;font-size:13px;margin-bottom:10px}
#intro h1{font-size:clamp(28px,6.2vw,44px);letter-spacing:.05em;line-height:1.3}
#intro .sub{margin:14px auto 6px;max-width:48ch;color:#c0b498;font-size:16px;line-height:1.85}
.hand-preview{display:flex;justify-content:center;gap:0;margin:34px 0 10px;height:132px;align-items:flex-end}
.mini-card{
  width:76px;height:112px;border-radius:7px;border:1px solid var(--gold-dim);
  background:linear-gradient(170deg,#241d15,#161210);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  font-family:var(--display);color:var(--gold-hi);
  box-shadow:0 10px 24px rgba(0,0,0,.55);
  transform-origin:bottom center;
}
.mini-card small{font-size:9px;letter-spacing:.22em;color:var(--washi-dim);font-family:var(--body)}
.mini-card .k{font-size:26px}
.mini-card:nth-child(1){transform:rotate(-14deg) translateX(16px)}
.mini-card:nth-child(2){transform:rotate(-7deg) translateX(8px)}
.mini-card:nth-child(3){transform:rotate(0) translateY(-8px);border-color:var(--gold)}
.mini-card:nth-child(4){transform:rotate(7deg) translateX(-8px)}
.mini-card:nth-child(5){transform:rotate(14deg) translateX(-16px)}
button{font-family:var(--body);cursor:pointer;border:none}
.btn-gold{
  margin-top:26px;padding:15px 40px;border-radius:6px;
  background:linear-gradient(140deg,var(--gold-hi),var(--gold) 55%,var(--gold-dim));
  color:#241a08;font-weight:700;font-size:16px;letter-spacing:.1em;
  box-shadow:0 6px 22px rgba(200,162,77,.28);
  transition:transform .15s ease, box-shadow .15s ease;
}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(200,162,77,.4)}
.btn-gold:focus-visible,.btn-ghost:focus-visible,.opt:focus-visible,.btn-outline:focus-visible{outline:2px solid var(--gold-hi);outline-offset:3px}
.btn-ghost{
  margin-top:14px;background:transparent;color:var(--gold);font-size:13px;letter-spacing:.14em;
  border-bottom:1px solid var(--gold-dim);padding:4px 2px;
}
.note-tiny{margin-top:26px;color:#6d6353;font-size:11.5px;letter-spacing:.06em}

/* ---------- quiz ---------- */
.hud{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;gap:12px;flex-wrap:wrap}
.hud .qcount{font-family:var(--display);color:var(--gold);letter-spacing:.18em;font-size:12px}
.layers{display:flex;gap:8px}
.layer-seal{
  width:34px;height:34px;border-radius:50%;border:1px solid #4a3d28;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--display);font-size:15px;color:#5b4f3b;
  transition:all .4s ease;
}
.layer-seal.lit{
  border-color:var(--gold);color:var(--gold-hi);
  background:radial-gradient(circle,#2c2113,#181209);
  box-shadow:0 0 10px rgba(200,162,77,.35);
}
.q-scene{font-size:13px;color:var(--gold);letter-spacing:.22em;font-family:var(--display);margin-bottom:10px}
.q-text{font-size:clamp(20px,4.8vw,26px);line-height:1.6;margin-bottom:26px;font-family:var(--display);font-weight:600}
.opts{display:grid;gap:14px}
.opt{
  text-align:left;padding:18px 20px;border-radius:8px;
  border:1px solid #3c3223;background:linear-gradient(160deg,#1e1913,#161210);
  color:var(--washi);font-size:16px;line-height:1.7;
  display:flex;align-items:center;gap:14px;
  transition:border-color .15s, transform .15s, background .15s;
}
.opt:hover{border-color:var(--gold);transform:translateX(4px);background:#231c13}
.opt .swatch{flex:0 0 56px;height:56px;border-radius:6px;border:1px solid var(--gold-dim);overflow:hidden}
.opt .swatch svg{display:block;width:100%;height:100%}
.opt b{font-family:var(--display);color:var(--gold-hi);font-weight:600}

/* fact interstitial */
.fact{
  border-left:3px solid var(--gold);
  background:linear-gradient(160deg,#221b12,#191410);
  border-radius:0 8px 8px 0;
  padding:18px 20px;margin-top:4px;
}
.fact .tag{
  display:inline-block;font-family:var(--display);font-size:11px;color:#1d1508;
  background:linear-gradient(140deg,var(--gold-hi),var(--gold));
  padding:2px 10px;border-radius:3px;letter-spacing:.24em;margin-bottom:10px;
}
.fact h3{font-size:19px;margin-bottom:10px;color:var(--gold-hi)}
.fact p{font-size:16px;color:#c0b498;line-height:1.9}
.fact .btn-gold{margin-top:18px;padding:11px 30px;font-size:14px}

/* ---------- result ---------- */
.result-card{
  border:1.5px solid var(--gold);border-radius:14px;overflow:hidden;
  background:#14100c;
  box-shadow:0 0 0 6px rgba(200,162,77,.12), 0 24px 60px rgba(0,0,0,.65);
}
.result-card.hiden{border-color:var(--gold-hi);box-shadow:0 0 0 6px rgba(236,207,133,.22),0 0 60px rgba(200,162,77,.35)}
.rc-banner{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 16px;background:linear-gradient(90deg,#241c10,#1a1409);
  border-bottom:1px solid var(--gold-dim);
}
.rc-banner .cat{font-family:var(--display);letter-spacing:.35em;color:var(--gold-hi);font-size:13px}
.rc-banner .seal{
  width:28px;height:28px;border-radius:50%;border:1px solid var(--gold);
  display:flex;align-items:center;justify-content:center;font-family:var(--display);
  font-size:13px;color:var(--gold-hi);
}
.rc-scene{height:210px}
.rc-scene svg{display:block;width:100%;height:100%}
.rc-name{text-align:center;padding:20px 18px 6px}
.rc-name .big-kanji{
  font-family:var(--display);font-size:64px;line-height:1;color:var(--gold-hi);
  text-shadow:0 4px 24px rgba(200,162,77,.35);
}
.rc-name h2{font-size:24px;margin-top:8px;letter-spacing:.04em}
.rc-name .romaji{color:var(--washi-dim);font-size:13px;letter-spacing:.24em;margin-top:2px}
.rc-essence{max-width:54ch;margin:14px auto 0;padding:0 22px;text-align:center;color:var(--washi-dim);font-size:16px;line-height:1.9}
.rc-ori{margin:22px 18px 0;border:1px solid var(--gold-dim);border-radius:8px;overflow:hidden}
.rc-ori .band{height:56px}
.rc-ori .band svg{display:block;width:100%;height:100%}
.rc-ori .cap{padding:14px 18px;font-size:15.5px;color:#bfb29a;background:#1a1510;line-height:1.85}
.rc-ori .cap b{color:var(--gold-hi);font-family:var(--display);font-weight:600}
.rc-rows{padding:18px}
.rc-row{
  border:1px solid #352c1e;border-radius:8px;padding:14px 16px;margin-bottom:12px;
  background:linear-gradient(160deg,#1d1710,#15110c);
}
.rc-row h4{font-family:var(--display);color:var(--gold);font-size:13.5px;letter-spacing:.24em;margin-bottom:10px;font-weight:600}
.rc-row p,.rc-row li{font-size:16px;color:var(--washi);line-height:1.85}
.rc-row ul{list-style:none}
.rc-row li{padding:7px 0 7px 22px;position:relative;color:var(--washi-dim);line-height:1.75}
.rc-row li::before{content:"◆";position:absolute;left:0;top:6px;font-size:9px;color:var(--gold)}
.rc-row li b{color:var(--washi)}
.rc-orn{display:flex;align-items:center;gap:16px}
.rc-orn .kz{flex:0 0 84px;height:64px;border:1px solid #3a3021;border-radius:6px;background:#171209;overflow:hidden}
.rc-orn .kz svg{display:block;width:100%;height:100%}
.actions{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-top:26px}
.actions .btn-gold{margin-top:0}
.btn-outline{
  padding:14px 26px;border-radius:6px;border:1px solid var(--gold-dim);
  background:transparent;color:var(--gold-hi);font-size:14px;letter-spacing:.08em;
}
.btn-outline:hover{border-color:var(--gold)}
.share-toast{text-align:center;margin-top:14px;font-size:13px;color:var(--gold-hi);opacity:0;transition:opacity .3s}
.share-toast.show{opacity:1}
.hiden-flare{
  text-align:center;font-family:var(--display);color:var(--gold-hi);
  letter-spacing:.28em;font-size:12px;padding-bottom:14px;
}

/* ---------- compendium ---------- */
#compendium h2{margin-bottom:6px}
#compendium .lede{color:var(--washi-dim);font-size:14px;margin-bottom:22px}
.comp-grid{display:grid;grid-template-columns:1fr;gap:14px}
@media(min-width:560px){.comp-grid{grid-template-columns:1fr 1fr}}
.comp-card{
  border:1px solid #3a3021;border-radius:10px;overflow:hidden;
  background:linear-gradient(160deg,#1e1811,#15110c);
  display:flex;flex-direction:column;
}
.comp-art{height:110px;border-bottom:1px solid #33291b;background:#151009}
.comp-art svg{display:block;width:100%;height:100%}
.comp-body{padding:16px 18px}
.comp-card .ck{font-family:var(--display);color:var(--gold-hi);font-size:15px;letter-spacing:.1em;margin-bottom:6px}
.comp-card .ck span{
  display:inline-block;border:1px solid var(--gold-dim);border-radius:50%;
  width:26px;height:26px;text-align:center;line-height:24px;font-size:13px;margin-right:8px;
}
.comp-card p{font-size:15.5px;color:#b8ab96;line-height:1.85}
.back-row{margin-top:26px;text-align:center}

footer{
  position:relative;z-index:1;text-align:center;padding:0 20px 40px;
  color:#5d5445;font-size:11px;letter-spacing:.14em;
}

/* ---- stamp rally & Takashimaya promo ---- */
.promo{margin-top:28px;border:1.5px solid var(--gold);border-radius:12px;overflow:hidden;background:linear-gradient(160deg,var(--panel),var(--lacquer-2))}
.promo-head{padding:18px 20px 6px;text-align:center}
.promo-head .kicker{font-family:var(--display);font-size:11px;letter-spacing:.3em;color:var(--gold);display:block;margin-bottom:8px}
.promo-head h3{font-family:var(--display);font-size:20px;color:var(--washi)}
.promo-body{padding:6px 20px 20px;text-align:center}
.promo-body p{font-size:15px;color:var(--washi-dim);line-height:1.85;max-width:56ch;margin:0 auto}
.stamps{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin:18px 0 8px}
.stamp{width:54px;height:54px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#f6efe0;font-family:var(--display);border:2px dashed rgba(246,239,224,.55);box-shadow:0 3px 10px rgba(0,0,0,.22)}
.stamp .n{font-size:10px;opacity:.85;line-height:1}
.stamp .k{font-size:14px;font-weight:700;line-height:1.25}
.promo-tk{margin:14px 16px 18px;border:1px solid var(--gold-dim);border-radius:8px;padding:14px 18px;background:rgba(200,162,77,.08);text-align:left}
.promo-tk h4{font-family:var(--display);color:var(--gold);font-size:13px;letter-spacing:.22em;margin-bottom:8px}
.promo-tk p{font-size:14.5px;color:var(--washi);line-height:1.85}
.promo-note{font-size:12px;color:var(--washi-dim);opacity:.85;margin-top:10px}
.promo-map{display:inline-block;margin-top:14px;padding:12px 28px;border-radius:6px;border:1px solid var(--gold);color:var(--gold-hi);text-decoration:none;font-size:14px;letter-spacing:.08em}
.promo-map:hover{background:rgba(200,162,77,.12)}
</style>
</head>
<body>
<div id="flecks" aria-hidden="true"></div>

<main class="stage">

  <!-- ============ INTRO ============ -->
  <section class="screen on" id="intro" aria-label="Introduction">
    <div class="mon">織</div>
    <div class="jp-line">織モザイク ・ 数寄者診断</div>
    <h1 id="i-title"></h1>
    <p class="sub" id="i-sub"></p>

    <div class="hand-preview" aria-hidden="true">
      <div class="mini-card"><span class="k">景</span><small>KEI</small></div>
      <div class="mini-card"><span class="k">美</span><small>BIJIN</small></div>
      <div class="mini-card"><span class="k">織</span><small>ORI</small></div>
      <div class="mini-card"><span class="k">飾</span><small>KAZARI</small></div>
      <div class="mini-card"><span class="k">秘</span><small>HIDEN</small></div>
    </div>

    <button class="btn-gold" id="i-start" onclick="startQuiz()"></button><br>
    <button class="btn-ghost" id="i-comp" onclick="show('compendium')"></button>
    <p class="note-tiny" id="i-note"></p>
  </section>

  <!-- ============ QUIZ ============ -->
  <section class="screen" id="quiz" aria-label="Quiz">
    <div class="hud">
      <span class="qcount" id="qcount"></span>
      <div class="layers" id="layers" aria-label="Your hand assembles">
        <div class="layer-seal" data-l="0">景</div>
        <div class="layer-seal" data-l="1">織</div>
        <div class="layer-seal" data-l="2">飾</div>
        <div class="layer-seal" data-l="3">美</div>
        <div class="layer-seal" data-l="4">秘</div>
      </div>
    </div>
    <div class="frame">
      <div class="q-scene" id="qscene"></div>
      <p class="q-text" id="qtext"></p>
      <div class="opts" id="opts"></div>
    </div>
  </section>

  <!-- ============ FACT ============ -->
  <section class="screen" id="factscreen" aria-label="Cultural note">
    <div class="fact">
      <span class="tag">豆知識 · MAME-CHISHIKI</span>
      <div class="choice-echo" id="factchoice"></div>
      <h3 id="facttitle"></h3>
      <p id="factbody"></p>
      <button class="btn-gold" id="factnext" onclick="nextQuestion()"></button>
    </div>
  </section>

  <!-- ============ RESULT ============ -->
  <section class="screen" id="result" aria-label="Your result"></section>

  <!-- ============ COMPENDIUM ============ -->
  <section class="screen" id="compendium" aria-label="Craft compendium">
    <div class="eyebrow">Craft Compendium · 工芸図鑑</div>
    <h2 id="c-title"></h2>
    <p class="lede" id="c-lede"></p>
    <div class="comp-grid" id="compgrid"></div>
    <div class="back-row"><button class="btn-outline" id="c-back" onclick="show('intro')"></button></div>
  </section>

</main>

<footer>ORI-MOSAIC 織モザイク · A PLAYFUL PRELUDE TO NIHONBASHI · 伝統を「所有」し、未来を「描く」<br><span style="opacity:.55">v12 · 2026-07-09</span></footer>
<script>
/* ================= gold flecks ================= */
(function(){
  const wrap = document.getElementById('flecks');
  for(let i=0;i<42;i++){
    const f=document.createElement('span');
    f.className='fleck';
    const s=2+Math.random()*9;
    f.style.width=s+'px'; f.style.height=(s*(0.5+Math.random()))+'px';
    f.style.left=Math.random()*100+'vw';
    f.style.top=Math.random()*100+'vh';
    f.style.transform='rotate('+(Math.random()*360)+'deg)';
    f.style.animationDelay=(Math.random()*7)+'s';
    wrap.appendChild(f);
  }
})();

/* ================= i18n ================= */
/* Every string ships as {en, ja} and both are rendered together. */

const T={

<script>
/* ================= bilingual content ================= */
const QUESTIONS = [
  {
    scene:{en:"QUESTION 1 · YOUR FIRST MORNING",ja:"第一問・はじめての朝"},
    text:{en:"You wake in Tokyo before the city does. Where do your feet carry you?",ja:"東京で、街より早く目が覚めた。足はどこへ向かう？"},
    opts:[
      {t:{en:"<b>Nihonbashi bridge at dawn</b> — stone lions, empty air, the whole country's roads once began here.",
          ja:"<b>夜明けの日本橋へ</b>——静まり返った石の獅子。かつて全国の道はここから始まった。"},
       ax:{S:1,I:1},
       fact:{h:{en:"Nihonbashi is Japan's kilometer zero",ja:"日本橋は日本の「キロメートル・ゼロ」"},
             p:{en:"Since 1603, all five great highways of Edo began at this bridge — road distances across Japan are still measured from a marker at its center. The current stone bridge (1911) survived earthquake and war, and Takashimaya's Nihonbashi store was the first department store building ever named an Important Cultural Property.",
                ja:"1603年以来、江戸五街道はすべてこの橋から始まりました。全国への道路距離は、今も橋の中央の「日本国道路元標」から測られています。現在の石橋（1911年）は震災と戦災を生き延び、高島屋日本橋店は百貨店建築として初めて重要文化財に指定されました。"}}},
      {t:{en:"<b>The depachika food halls</b> — a museum you can taste, glass cases like jewelry.",
          ja:"<b>デパ地下へ</b>——味わえる美術館、宝石箱のようなショーケース。"},
       ax:{D:1,H:1},
       fact:{h:{en:"The depachika is a world of its own",ja:"デパ地下は、ひとつの宇宙"},
             p:{en:"Japan's department-store basement food halls are a uniquely Japanese institution — thousands of products, impeccably wrapped, served by staff who treat a ¥300 mochi with the same care as a ¥30,000 box of confections. Takashimaya Nihonbashi's basement stocks items from artisan producers whose shops you won't find anywhere else.",
                ja:"日本のデパ地下は世界でも類を見ない空間です。数千の商品が完璧に包まれ、300円の餅も3万円の菓子箱と同じ丁寧さで扱われます。日本橋高島屋の地下には、他では手に入らない職人の品が並んでいます。"}}},
      {t:{en:"<b>A backstreet atelier</b>, sliding door half-open, someone already at work.",
          ja:"<b>路地裏の工房へ</b>——半分開いた引き戸の奥で、誰かがもう手を動かしている。"},
       ax:{S:1,H:1},
       fact:{h:{en:"The artisan's day begins before yours",ja:"職人の一日は、あなたより早く始まる"},
             p:{en:"Many traditional craftspeople — lacquer artists, printmakers, textile dyers — begin work at first light, when humidity and temperature are most stable for their materials. Nihonbashi's surrounding streets still shelter small ateliers passed down through generations; some accept visitors who ask politely.",
                ja:"漆師、摺師、染め師など多くの職人は、素材にとって湿度と温度が最も安定した夜明けとともに仕事を始めます。日本橋界隈の路地には、代々受け継がれてきた小さな工房が今も残り、丁寧に声をかければ見学を受け入れてくれる場所もあります。"}}},
      {t:{en:"<b>The morning market</b> — banter with vendors, tea in a paper cup.",
          ja:"<b>朝市へ</b>——売り子との掛け合い、紙コップのお茶。"},
       ax:{D:1,I:1},
       fact:{h:{en:"Shitamachi energy: the warmth of the low city",ja:"下町気質——「低い街」の温かさ"},
             p:{en:"Shitamachi — literally 'low city' — was Edo's merchant and artisan quarter, known for its frank, generous, community spirit. Nihonbashi was its commercial heart. That culture of easy banter with strangers is still alive in the area's older food markets and covered shotengai shopping streets.",
                ja:"「下町」——文字どおり「低い街」——は江戸の職人・商人の町で、率直で温かい共同体の気風で知られていました。日本橋はその商業の中心地でした。見知らぬ人と気さくに話す文化は、今も古い食市場や商店街に息づいています。"}}}
    ],
    lit:0
  },
  {
    scene:{en:"QUESTION 2 · THE PATTERN YOU WEAR",ja:"第二問・身にまとう文様"},
    text:{en:"A kimono maker lays four bolts of cloth before you. Patterns are worn wishes — which do you reach for?",ja:"呉服屋が四反の布を広げた。文様は「身にまとう願い」——どれに手が伸びる？"},
    swatch:true,
    opts:[
      {t:{en:"<b>青海波 Seigaiha</b> — endless calm waves",ja:"<b>青海波</b>——どこまでも続く、穏やかな波"},
       ax:{S:1,I:1},pat:['seigaiha','#8fa6c4','#232f4b'],
       fact:{h:{en:"Seigaiha: wishing for calm seas ahead",ja:"青海波——前途に穏やかな海を"},
             p:{en:"Seigaiha — 'blue-sea wave' — is one of Japan's oldest patterns, appearing on court costumes from the 8th century. Each overlapping arc represents a wave, and together they express the wish for a peaceful, untroubled life stretching as far as the eye can see. It's also the namesake of a court dance performed at important ceremonies.",
                ja:"「青海波」は8世紀の宮廷装束にも見られる、日本最古の文様のひとつ。重なり合う弧はそれぞれ一つの波を表し、どこまでも続く穏やかな人生への願いを込めています。同名の雅楽の舞は、今も重要な式典で奉納されます。"}}},
      {t:{en:"<b>麻の葉 Asanoha</b> — hemp leaf, swift growth & protection",ja:"<b>麻の葉</b>——まっすぐ育つ麻、成長と魔除け"},
       ax:{D:1,I:1},pat:['asanoha','#c9bda4','#3d4a35'],
       fact:{h:{en:"Asanoha: the pattern sewn into children's clothes",ja:"麻の葉——子どもの産着に縫い込まれた文様"},
             p:{en:"Hemp (asa) grows straight, fast, and strong — so asanoha was traditionally embroidered into babies' clothing as a prayer for healthy, swift growth. The six-pointed star shape is formed by overlapping rhombuses, creating an endlessly repeating geometry that also symbolises protection from evil.",
                ja:"麻はまっすぐ、早く、たくましく育ちます。だから麻の葉文様は古くから赤ちゃんの産着に施され、健やかな成長への祈りが込められてきました。六角形の星型は菱形が重なって生まれ、その絶え間ない繰り返しが魔除けの意味も持ちます。"}}},
      {t:{en:"<b>亀甲 Kikkō</b> — tortoise-shell hexagons, long life",ja:"<b>亀甲</b>——亀の甲羅の六角形、長寿の印"},
       ax:{S:1,H:1},pat:['kikko','#c8a24d','#33261a'],
       fact:{h:{en:"Kikkō: ten thousand years in six sides",ja:"亀甲——六角形に宿る一万年"},
             p:{en:"The tortoise is said to live ten thousand years in Japanese lore, making its shell pattern the ultimate symbol of longevity. Kikkō appears on samurai armour, temple ceilings, and Nishijin brocade obi. The hexagon is also nature's most efficient tiling — bees know it, and so did Edo's weavers.",
                ja:"日本の伝説では亀は一万年生きるとされ、甲羅の文様は長寿の最上の象徴です。亀甲は武士の鎧、寺の天井、西陣織の帯に登場します。六角形は自然界で最も効率的な敷き詰め形——蜜蜂も知っている真理を、江戸の織り手も熟知していました。"}}},
      {t:{en:"<b>市松 Ichimatsu</b> — bold checkers, unbroken prosperity",ja:"<b>市松</b>——大胆な格子、途切れぬ繁栄"},
       ax:{D:1,H:1},pat:['ichimatsu','#8e2c33','#f2e7d2'],
       fact:{h:{en:"Ichimatsu: the kabuki actor who launched a fashion craze",ja:"市松——流行を作った歌舞伎役者"},
             p:{en:"The pattern is named after Sanogawa Ichimatsu, an 18th-century kabuki actor whose white-and-indigo checked hakama caused an immediate sensation. Edo had influencers; they just wore silk. The checkerboard tiles have no end — so the pattern also carries a wish for unbroken prosperity through generations.",
                ja:"この文様の名は18世紀の歌舞伎役者・佐野川市松に由来します。彼の白と藍の格子柄の袴が一世を風靡したのです。江戸にもインフルエンサーがいました——ただ絹を纏っていたのです。格子に終わりはなく、子々孫々まで繁栄が続く願いも込められています。"}}}
    ],
    lit:1
  },
  {
    scene:{en:"QUESTION 3 · IN THE PRINTMAKER'S STUDIO",ja:"第三問・摺師の工房で"},
    text:{en:"A woodblock printmaker grants you one question. You ask:",ja:"浮世絵の摺師が、ひとつだけ質問を許してくれた。あなたが尋ねるのは："},
    opts:[
      {t:{en:"\u201CHow many years until your hands simply <b>know</b>?\u201D",ja:"「手が勝手に<b>覚える</b>まで、何年かかりましたか」"},
       ax:{S:1,I:1},
       fact:{h:{en:"The body knows what the mind forgets",ja:"体が知っていることを、頭は忘れる"},
             p:{en:"Master printers say it takes at least ten years before the hands can feel the correct pressure without conscious thought — adjusting for humidity, paper thickness, and ink viscosity in a single motion. This embodied knowledge, called 'te no kioku' (hand memory), cannot be written down or transferred any other way.",
                ja:"名人の摺師は、意識せずして正しい力加減を感じられるようになるまで少なくとも十年かかると言います——湿度、紙の厚み、墨の粘度を一つの動作で調整する。「手の記憶」と呼ばれるこの身体知は、書き留めることも、他の方法で伝えることもできません。"}}},
      {t:{en:"\u201CShow me the <b>boldest pigment</b> you own.\u201D",ja:"「いちばん<b>大胆な顔料</b>を見せてください」"},
       ax:{D:1,H:1},
       fact:{h:{en:"Beni-e: the shocking red that cost a fortune",ja:"紅絵——一財産を要した衝撃の赤"},
             p:{en:"The most prized pigment in Edo printing was beni — safflower red — extracted from thousands of dried petals to produce just a small jar of dye. A beni-e print (safflower-red picture) commanded ten times the price of a standard print. The shogunate eventually banned it as too extravagant, which only made collectors want it more.",
                ja:"江戸摺りで最も貴重な顔料は「紅」——数千枚の紅花の花びらから僅かな染料しか採れません。「紅絵」は通常の版画の十倍の値がつくこともありました。幕府はその贅沢さを理由にやがて禁止しましたが、それがかえってコレクターの欲望を高めました。"}}},
      {t:{en:"\u201CWho carved these blocks <b>before you</b>?\u201D",ja:"「この版木は、<b>あなたの前は</b>誰が彫ったのですか」"},
       ax:{S:1,H:1},
       fact:{h:{en:"The block outlives the carver",ja:"版木は、彫師より長く生きる"},
             p:{en:"A well-made cherry-wood block can produce thousands of prints over decades. It is common for a block to have been carved by a master, passed to an apprentice, and now in the hands of a third-generation printer — each generation adding slight wear that connoisseurs can read like a fingerprint. The block is not a tool; it is a collaborator across time.",
                ja:"上質な桜の版木は、数十年にわたって数千枚の版画を生み出せます。師匠が彫り、弟子に伝わり、今は三代目の摺師の手にある——各世代が刻む微かな摩耗を、目利きは指紋のように読み取ります。版木は道具ではなく、時を超えた共同制作者です。"}}},
      {t:{en:"\u201CMay I <b>pull one print</b> myself?\u201D",ja:"「一枚、<b>摺らせて</b>もらえますか」"},
       ax:{D:1,I:1},
       fact:{h:{en:"The baren: the most important tool you've never heard of",ja:"バレン——あなたが知らない、最も重要な道具"},
             p:{en:"The baren is a flat pad used to press paper against the inked block. A professional baren is a coiled bamboo-sheath rope wrapped in a bamboo leaf, and making one is itself a craft requiring years to master. Printers say they can feel the texture of the block through the baren — it is an extension of the hand, not just a tool.",
                ja:"バレンは、墨を塗った版木に紙を押しつけるための平らな道具です。職人用のバレンは竹の皮を螺旋状に巻き竹の葉で包んだもので、それを作ること自体が習得に年月を要する技術です。摺師はバレンを通して版木の質感を感じると言います——ただの道具ではなく、手の延長なのです。"}}}
    ],
    lit:1

  {
    scene:{en:"QUESTION 4 · ONE THING TO CARRY HOME",ja:"第四問・持ち帰るひとつ"},
    text:{en:"Your suitcase has room for exactly one treasure:",ja:"スーツケースに残された空きは、宝物ひとつ分："},
    opts:[
      {t:{en:"An <b>indigo-dyed tenugui</b> cloth — humble, useful, beautiful.",ja:"<b>藍染の手ぬぐい</b>——慎ましく、役に立ち、美しい。"},
       ax:{S:1,I:1},
       fact:{h:{en:"Tenugui: the cloth that does everything",ja:"手ぬぐい——何にでも使える布"},
             p:{en:"A tenugui is a thin cotton rectangle — originally a hand towel — that Edo people used as headscarf, sweatband, wrapping cloth, gift wrap, and wall hanging. Indigo (ai) dyeing has been practised in Japan for over 1,500 years; the dye also has natural antibacterial properties. A good tenugui, used daily, becomes softer and more beautiful over years.",
                ja:"手ぬぐいは薄い木綿の長方形の布——もとは手拭き——で、江戸の人々は頭巾、鉢巻き、風呂敷、包装紙、壁掛けとして使いました。藍染は日本で1500年以上の歴史を持ち、天然の抗菌効果もあります。良い手ぬぐいは毎日使うほど、年々柔らかく美しくなります。"}}},
      {t:{en:"A <b>hand-carved ornamental comb</b>, warm as amber.",ja:"琥珀のように温かい、<b>手彫りの飾り櫛</b>。"},
       ax:{S:1,H:1},
       fact:{h:{en:"Tsuge-gushi: the comb that takes three months to make",ja:"柘植の櫛——三ヶ月かけて作られる一本"},
             p:{en:"The finest traditional combs are carved from tsuge (Japanese box tree), a dense slow-growing wood that takes sixty or more years to reach usable thickness. After carving, the comb is polished with magnolia leaves, dried persimmon skin, and finally human hair — each step burnishing the wood to a warm, almost amber glow. One master carver may make fewer than a hundred in a year.",
                ja:"最上の伝統的な櫛は、使えるまでの厚みに育つのに六十年以上かかる緻密な木材、柘植（つげ）から彫り出されます。彫った後は朴の葉、干し柿の皮、そして人の髪で磨かれ、温かな琥珀色の艶が生まれます。名人の彫師でも、一年に百本も作れないことがあります。"}}},
      {t:{en:"A <b>lacquer sake cup</b> with gold maki-e sprinkled inside.",ja:"内側に金の蒔絵が散る、<b>漆の盃</b>。"},
       ax:{D:1,H:1},
       fact:{h:{en:"Maki-e: pictures sprinkled in gold",ja:"蒔絵——金で蒔く絵"},
             p:{en:"Maki-e means 'sprinkled picture' — the artist paints a design in wet lacquer, then dusts it with powdered gold, silver, or platinum. The technique was developed over a thousand years ago and reached its peak in the Edo period, when wealthy merchants commissioned writing boxes and sake sets to rival the imperial household's treasures.",
                ja:"蒔絵とは「蒔いた絵」——湿った漆で模様を描き、金・銀・白金の粉を蒔きます。この技法は千年以上前に生まれ、江戸時代に全盛を迎えました。裕福な商人たちが宮廷の宝物に匹敵する硯箱や盃を発注したのです。"}}},
      {t:{en:"A <b>washi-paper spinning top</b> from a toy shop older than your country's constitution.",ja:"あなたの国の憲法より古い玩具店の、<b>和紙の独楽</b>。"},
       ax:{D:1,I:1},
       fact:{h:{en:"Edo's toy shops: the world's first concept stores",ja:"江戸の玩具屋——世界初のコンセプトストア"},
             p:{en:"Several toy and craft shops in the Nihonbashi area have operated continuously since the Edo period — some for over 250 years. Washi (Japanese paper) is made from the inner bark of the kozo plant and is far stronger than it looks; a washi spinning top can last decades. These shops are living archives of play.",
                ja:"日本橋界隈には江戸時代から続く玩具・工芸品の店が今もあり、創業250年を超えるものもあります。和紙は楮（こうぞ）の内皮から作られ、見た目より遥かに丈夫。和紙の独楽は何十年も持ちます。こうした店は、遊びの生きた記録です。"}}}
    ],
    lit:2

  {
    scene:{en:"QUESTION 5 · AT THE COUNTER",ja:"第五問・カウンターで"},
    text:{en:"The chef sets down a dish he has clearly perfected over decades. You…",ja:"料理人が、何十年もかけて完成させた一皿を静かに置いた。あなたは……"},
    opts:[
      {t:{en:"Pause, look, then taste <b>in silence</b> — let the work speak.",ja:"一呼吸おいて眺め、<b>黙って</b>味わう——仕事に語らせる。"},
       ax:{S:1,I:1},
       fact:{h:{en:"Ma: the art of the meaningful pause",ja:"「間」——意味のある沈黙の技法"},
             p:{en:"Ma (間) — the Japanese concept of meaningful negative space — applies to time as much as to physical space. A pause before tasting, a beat of silence after a compliment, the moment between a door sliding open and stepping through: these intervals are not empty but full of attention. Mastering ma is one of the most Japanese things a visitor can do.",
                ja:"「間」——有意味な空白という日本の概念——は物理的な空間だけでなく、時間にも適用されます。味わう前の一呼吸、褒め言葉の後の一拍の沈黙、引き戸が開いてから踏み込むまでの瞬間。これらの間は空虚ではなく、注意で満たされています。間を体得することは、旅人にできる最も「日本的」なことのひとつです。"}}},
      {t:{en:"Ask what <b>inspired tonight's</b> composition.",ja:"「<b>今夜の一皿の着想</b>は？」と尋ねる。"},
       ax:{D:1,H:1},
       fact:{h:{en:"Kisetsukan: the Japanese art of tasting the season",ja:"季節感——季節を「味わう」日本の芸術"},
             p:{en:"Japanese cuisine is governed by kisetsukan — 'feeling of the season' — an obligation to use only what is at its peak right now. A chef inspired by tonight's dish is likely drawing on something that appeared at the market that morning. Menus at traditional restaurants can change daily; asking about the inspiration is the question that opens the conversation.",
                ja:"日本料理は「季節感」に支配されています——今まさに旬のものだけを使う義務です。今夜の一皿の着想を聞けば、おそらく今朝の市場に現れた何かが答えとして返ってきます。料亭のメニューは日々変わることもあり、着想を尋ねることが会話を開く問いになります。"}}},
      {t:{en:"Notice the vessel first — <b>\u201CIs this Kutani ware?\u201D</b>",ja:"まず器に目が行く——<b>「これは九谷焼ですか？」</b>"},
       ax:{S:1,H:1},
       fact:{h:{en:"In Japanese cuisine, the plate is part of the dish",ja:"日本料理では、器も料理のうち"},

}

function renderQuestion(){
  const q=QUESTIONS[qi];

  const jaTheme=q.scene.ja.split('・').pop();
  const enTheme=q.scene.en.split('·').pop().trim();
  document.getElementById('qscene').textContent = jaTheme+' · '+enTheme;
  document.getElementById('qtext').innerHTML =
    q.text.ja + `<span class="en-sub">${q.text.en}</span>`;
  const box=document.getElementById('opts');
  box.innerHTML='';
  q.opts.forEach((o,idx)=>{
    const b=document.createElement('button');
    b.className='opt';
    let sw='';
    if(q.swatch && o.pat){
      sw=`<span class="swatch" aria-hidden="true">${PATTERNS[o.pat[0]]('sw'+qi+'-'+idx,o.pat[1],o.pat[2])}</span>`;
    }
    b.innerHTML=sw+`<span>${o.t.ja}<span class="en-sub">${o.t.en}</span></span>`;
    b.onclick=()=>answer(o,q);
    box.appendChild(b);
  });
}

function answer(o,q){
  for(const k in o.ax) score[k]+=o.ax[k];
  const seal=document.querySelector('.layer-seal[data-l="'+q.lit+'"]');
  if(seal) seal.classList.add('lit');
  currentQ=q; currentChoice=o;
  renderFact(q,o);
  show('factscreen');
}

function renderFact(q,o){
  const fact=o.fact;
  const rx=REACT[rxKey(o.ax)];
  document.getElementById('factchoice').innerHTML =
    `<span class="lbl">あなたの選択 · YOUR CHOICE</span>
     ${o.t.ja}<span class="en-sub">${o.t.en}</span>
     <span class="rx">${rx.ja} <span style="color:var(--washi-dim);font-family:var(--body);font-size:.9em">${rx.en}</span></span>`;
  document.getElementById('facttitle').innerHTML = dual(fact.h);
  document.getElementById('factbody').innerHTML = dual(fact.p);
}

function nextQuestion(){
  qi++;
  if(qi<QUESTIONS.length){ renderQuestion(); show('quiz'); }
  else finish();
}

/* ---------- result ---------- */
function pickPersona(){
  const balanced = Math.abs(score.S-score.D)<=1 && Math.abs(score.I-score.H)<=1;
  if((balanced && Math.random()<0.2) || Math.random()<0.03) return PERSONAS.hiden;
  const sei = score.S>=score.D, iki = score.I>=score.H;
  if(sei&&iki) return PERSONAS.wabi;
  if(!sei&&iki) return PERSONAS.edokko;
  if(sei&&!iki) return PERSONAS.miyabi;
  return PERSONAS.kabuki;
}

function finish(){
  currentPersona=pickPersona();
  cachedCardDataUrl=null; cachedCardFile=null;
  renderResult(currentPersona);
  show('result');
  prewarmCard(); /* build the JPEG now, in the background */
}

/* =================================================================
   JPEG CARD COMPOSER
   Strategy: draw everything on <canvas> using only canvas 2D APIs —
   NO SVG-to-Blob (fails in many browsers). Patterns and scenes are
   re-drawn directly onto the canvas using the same math.
================================================================= */

const FAB={
  "侘":"大島紬 · Ōshima-tsumugi",
  "粋":"江戸小紋 · Edo-komon",
  "雅":"西陣織 · Nishijin-ori",
  "傾":"友禅 · Yūzen",
  "数":"金襴 · Kinran"
};

/* Draw a seigaiha wave pattern directly on canvas ctx */
function drawPatternOnCanvas(ctx, key, fg, bg, x, y, w, h){
  ctx.save();
  ctx.beginPath(); ctx.rect(x,y,w,h); ctx.clip();
  ctx.fillStyle=bg; ctx.fillRect(x,y,w,h);
  ctx.strokeStyle=fg; ctx.lineWidth=2.4; ctx.fillStyle='rgba(0,0,0,0)';
  const S=44; /* cell size */
  if(key==='seigaiha'){
    for(let row=-1; row<Math.ceil(h/S)+2; row++){
      for(let col=-1; col<Math.ceil(w/S)+2; col++){
        const cx2=x+col*S+(row%2)*S/2, cy2=y+row*S/2;
        [S*.45,S*.3,S*.15].forEach(r=>{
          ctx.beginPath(); ctx.arc(cx2,cy2+S*.4,r,Math.PI,0); ctx.stroke();
        });
      }
    }
  } else if(key==='asanoha'){
    const sz=36;
    for(let row=-1;row<Math.ceil(h/sz)+2;row++){
      for(let col=-1;col<Math.ceil(w/sz)+2;col++){
        const cx2=x+col*sz+(row%2)*sz/2, cy2=y+row*sz*.866;
        [[0,1],[60,1],[120,1],[180,1],[240,1],[300,1]].forEach(([a])=>{
          const rad=a*Math.PI/180;
          ctx.beginPath();
          ctx.moveTo(cx2,cy2);
          ctx.lineTo(cx2+Math.cos(rad)*sz*.42,cy2+Math.sin(rad)*sz*.42);
          ctx.stroke();
        });
        ctx.beginPath(); ctx.arc(cx2,cy2,2.4,0,Math.PI*2); ctx.fillStyle=fg; ctx.fill();
      }
    }
  } else if(key==='kikko'){
    const r=22;
    for(let row=-1;row<Math.ceil(h/(r*1.73))+2;row++){
      for(let col=-1;col<Math.ceil(w/(r*2))+2;col++){
        const cx2=x+col*r*2+(row%2)*r, cy2=y+row*r*1.73;
        ctx.beginPath();
        for(let i=0;i<6;i++){
          const a=i*Math.PI/3-Math.PI/6;
          i===0?ctx.moveTo(cx2+Math.cos(a)*r,cy2+Math.sin(a)*r)
               :ctx.lineTo(cx2+Math.cos(a)*r,cy2+Math.sin(a)*r);
        }
        ctx.closePath(); ctx.stroke();
      }
    }
  } else if(key==='ichimatsu'){
    const sz=40;
    for(let row=0;row<Math.ceil(h/sz)+2;row++){
      for(let col=0;col<Math.ceil(w/sz)+2;col++){
        if((row+col)%2===0){
          ctx.fillStyle=fg;
          ctx.fillRect(x+col*sz,y+row*sz,sz,sz);
        }
      }
    }
  } else if(key==='komon'){
    for(let row=0;row<Math.ceil(h/14)+2;row++){
      for(let col=0;col<Math.ceil(w/14)+2;col++){
        if((row+col)%2===0){
          ctx.beginPath();
          ctx.arc(x+col*14+3.5,y+row*14+3.5,1.6,0,Math.PI*2);
          ctx.fillStyle=fg; ctx.fill();
        }
      }
    }
  } else if(key==='brocade'){
    const sz=36;
    for(let row=-1;row<Math.ceil(h/sz)+2;row++){
      for(let col=-1;col<Math.ceil(w/sz)+2;col++){
        const cx2=x+col*sz+sz/2, cy2=y+row*sz+sz/2;
        ctx.beginPath();
        ctx.moveTo(cx2,cy2-sz*.44);
        ctx.lineTo(cx2+sz*.44,cy2);
        ctx.lineTo(cx2,cy2+sz*.44);
        ctx.lineTo(cx2-sz*.44,cy2);
        ctx.closePath(); ctx.stroke();
        ctx.beginPath(); ctx.arc(cx2,cy2,3,0,Math.PI*2);
        ctx.fillStyle=fg; ctx.fill();
      }
    }
  } else if(key==='yuzen'){
    const sz=48;
    for(let row=-1;row<Math.ceil(h/sz)+2;row++){
      for(let col=-1;col<Math.ceil(w/sz)+2;col++){
        const cx2=x+col*sz+sz/2, cy2=y+row*sz+sz/2;
        ctx.fillStyle=fg;
        ctx.beginPath(); ctx.ellipse(cx2,cy2-6,5,11,0,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(cx2+6,cy2,11,5,0,0,Math.PI*2);
        ctx.globalAlpha=.7; ctx.fill(); ctx.globalAlpha=1;
        ctx.beginPath(); ctx.arc(cx2+sz*.38,cy2+sz*.32,3,0,Math.PI*2); ctx.fill();
      }
    }
  }
  ctx.restore();
}

/* Draw a simplified landscape scene directly on canvas */
function drawSceneOnCanvas(ctx, sceneKey, x, y, w, h){
  ctx.save();
  ctx.beginPath(); ctx.rect(x,y,w,h); ctx.clip();

  if(sceneKey==='snow'){
    /* sky gradient */
    const g=ctx.createLinearGradient(x,y,x,y+h);
    g.addColorStop(0,'#37415a'); g.addColorStop(1,'#6b7288');
    ctx.fillStyle=g; ctx.fillRect(x,y,w,h);
    /* moon */
    ctx.beginPath(); ctx.arc(x+w*.82,y+h*.22,h*.1,0,Math.PI*2);
    ctx.fillStyle='rgba(233,226,210,.85)'; ctx.fill();
    /* bridge arch */
    ctx.fillStyle='#e8e4da';
    ctx.beginPath(); ctx.moveTo(x,y+h*.72); ctx.quadraticCurveTo(x+w/2,y+h*.46,x+w,y+h*.72);
    ctx.lineTo(x+w,y+h*.79); ctx.quadraticCurveTo(x+w/2,y+h*.53,x,y+h*.79); ctx.closePath(); ctx.fill();
    /* railings */
    ctx.strokeStyle='#e8e4da'; ctx.lineWidth=3;
    [.15,.3,.45,.55,.7,.85].forEach(rx=>{
      const baseY=y+h*.72 - Math.sin(rx*Math.PI)*h*.26;
      ctx.beginPath(); ctx.moveTo(x+rx*w,baseY); ctx.lineTo(x+rx*w,baseY+h*.08); ctx.stroke();
    });
    /* water */
    ctx.fillStyle='#232c3f'; ctx.fillRect(x,y+h*.79,w,h*.21);
    /* snowflakes */
    ctx.fillStyle='rgba(233,226,210,.7)';
    for(let i=0;i<40;i++){
      ctx.beginPath();
      ctx.arc(x+(i*113)%w, y+(i*79)%h, 1+(i%3)*.8, 0, Math.PI*2); ctx.fill();
    }
  } else if(sceneKey==='hanabi'){
    const g=ctx.createLinearGradient(x,y,x,y+h);
    g.addColorStop(0,'#101527'); g.addColorStop(1,'#233054');
    ctx.fillStyle=g; ctx.fillRect(x,y,w,h);
    /* fireworks */
    [[x+w*.28,y+h*.29,'#e8c877'],[x+w*.7,y+h*.21,'#c96a5a'],[x+w*.51,y+h*.43,'#9db8d9']].forEach(([fx,fy,fc])=>{
      ctx.strokeStyle=fc; ctx.lineWidth=1.6;
      for(let i=0;i<12;i++){
        const a=i*Math.PI/6;
        ctx.beginPath(); ctx.moveTo(fx,fy);
        ctx.lineTo(fx+Math.cos(a)*w*.07,fy+Math.sin(a)*w*.07); ctx.stroke();
      }
      ctx.beginPath(); ctx.arc(fx,fy,4,0,Math.PI*2); ctx.fillStyle=fc; ctx.fill();
    });
    /* river silhouette */
    ctx.fillStyle='#0c0f1a';
    ctx.beginPath(); ctx.moveTo(x,y+h*.75); ctx.quadraticCurveTo(x+w/2,y+h*.53,x+w,y+h*.75);
    ctx.lineTo(x+w,y+h*.82); ctx.quadraticCurveTo(x+w/2,y+h*.6,x,y+h*.82); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#182241'; ctx.fillRect(x,y+h*.82,w,h*.18);
    /* lantern reflections */
    ctx.fillStyle='rgba(232,200,119,.6)';
    [.08,.23,.38,.58,.75,.9].forEach(rx=>{
      ctx.fillRect(x+rx*w,y+h*.84,w*.06,h*.02);
    });
  } else if(sceneKey==='fuji'){
    const g=ctx.createLinearGradient(x,y,x,y+h);
    g.addColorStop(0,'#f0e0bd'); g.addColorStop(1,'#e6c896');
    ctx.fillStyle=g; ctx.fillRect(x,y,w,h);
    /* sun */
    ctx.beginPath(); ctx.arc(x+w*.18,y+h*.25,h*.095,0,Math.PI*2);
    ctx.fillStyle='#b8433f'; ctx.fill();
    /* fuji */
    ctx.fillStyle='#5a6d8f';
    ctx.beginPath(); ctx.moveTo(x+w*.33,y+h*.71); ctx.lineTo(x+w*.59,y+h*.2); ctx.lineTo(x+w*.85,y+h*.71); ctx.closePath(); ctx.fill();
    /* snow cap */
    ctx.fillStyle='#f4efe3';
    ctx.beginPath(); ctx.moveTo(x+w*.53,y+h*.32); ctx.lineTo(x+w*.59,y+h*.2); ctx.lineTo(x+w*.65,y+h*.32);
    ctx.lineTo(x+w*.615,y+h*.35); ctx.lineTo(x+w*.59,y+h*.3); ctx.lineTo(x+w*.565,y+h*.35); ctx.closePath(); ctx.fill();
    /* rooftops */
    ctx.fillStyle='#2f2a24';
    [0,.175,.35,.525,.7,.875].forEach((rx,i)=>{
      const oy=(i%2)*h*.04;
      ctx.beginPath();
      ctx.moveTo(x+rx*w,y+h); ctx.lineTo(x+rx*w,y+h*.84-oy);
      ctx.lineTo(x+(rx+.088)*w,y+h*.76-oy); ctx.lineTo(x+(rx+.175)*w,y+h*.84-oy);
      ctx.lineTo(x+(rx+.175)*w,y+h); ctx.closePath(); ctx.fill();
    });
  } else if(sceneKey==='chochin'){
    const g=ctx.createLinearGradient(x,y,x,y+h);
    g.addColorStop(0,'#231226'); g.addColorStop(1,'#3c1e33');
    ctx.fillStyle=g; ctx.fillRect(x,y,w,h);
    /* rope */
    ctx.strokeStyle='#120a14'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(x,y+h*.25); ctx.lineTo(x+w,y+h*.22); ctx.stroke();
    /* lanterns */
    [.1,.28,.46,.63,.81,.97].forEach((rx,i)=>{
      const lx=x+rx*w, ly=y+h*.25, off=(i%2)*h*.03;
      ctx.strokeStyle='#120a14'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(lx,ly+h*.06+off); ctx.stroke();
      ctx.fillStyle='#b8433f';
      ctx.beginPath(); ctx.ellipse(lx,ly+h*.4+off,w*.04,h*.21,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#d96a57'; ctx.globalAlpha=.6;
      ctx.beginPath(); ctx.ellipse(lx-w*.01,ly+h*.37+off,w*.014,h*.12,0,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1;
      /* ribs */
      ctx.strokeStyle='#7c2320'; ctx.lineWidth=1;
      [-h*.08,-h*.04,0,h*.04].forEach(dy=>{
        ctx.beginPath(); ctx.ellipse(lx,ly+h*.4+off+dy,w*.04,h*.02,-0.1,0,Math.PI*2); ctx.stroke();
      });
      /* cap */
      ctx.fillStyle='#e8c877';
      ctx.fillRect(lx-w*.017,ly+h*.29+off,w*.034,h*.04);
    });
    ctx.fillStyle='#160d18'; ctx.fillRect(x,y+h*.84,w,h*.16);
  } else if(sceneKey==='gold'){
    const g=ctx.createLinearGradient(x,y,x,y+h);
    g.addColorStop(0,'#2a2010'); g.addColorStop(1,'#6b5324');
    ctx.fillStyle=g; ctx.fillRect(x,y,w,h);
    /* glowing sun */
    ctx.shadowColor='rgba(236,207,133,.5)'; ctx.shadowBlur=40;
    ctx.beginPath(); ctx.arc(x+w/2,y+h*.31,h*.14,0,Math.PI*2);
    ctx.fillStyle='#eccf85'; ctx.fill();
    ctx.shadowBlur=0;
    /* gold bridge */
    ctx.fillStyle='#eccf85';
    ctx.beginPath(); ctx.moveTo(x,y+h*.75); ctx.quadraticCurveTo(x+w/2,y+h*.52,x+w,y+h*.75);
    ctx.lineTo(x+w,y+h*.82); ctx.quadraticCurveTo(x+w/2,y+h*.59,x,y+h*.82); ctx.closePath(); ctx.fill();
    /* railings */
    ctx.strokeStyle='#eccf85'; ctx.lineWidth=3;
    [.15,.3,.45,.55,.7,.85].forEach(rx=>{
      const baseY=y+h*.75 - Math.sin(rx*Math.PI)*h*.23;
      ctx.beginPath(); ctx.moveTo(x+rx*w,baseY); ctx.lineTo(x+rx*w,baseY+h*.08); ctx.stroke();
    });
    ctx.fillStyle='#1c1408'; ctx.fillRect(x,y+h*.82,w,h*.18);
    /* gold flecks */
    ctx.fillStyle='#eccf85';
    for(let i=0;i<24;i++){
      ctx.save(); ctx.globalAlpha=.7;
      ctx.translate(x+(i*71)%w,y+(i*53)%h);
      ctx.rotate(i*.9);
      ctx.fillRect(0,0,4,2); ctx.restore();
    }
  }
  ctx.restore();
}


/* Convert a data: URL to a Blob without fetch() — works in all browsers */
function dataURLtoBlob(dataUrl){
  const [header, data] = dataUrl.split(',');
  const mime = header.match(/:(.*?);/)[1];
  const binary = atob(data);
  const arr = new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) arr[i]=binary.charCodeAt(i);
  return new Blob([arr],{type:mime});
}

async function composeCard(p){
  /* wait for fonts — with timeout so it never hangs */
  try{
    await Promise.race([
      Promise.all([
        document.fonts.load('700 160px "Shippori Mincho"'),
        document.fonts.load('700 50px "Shippori Mincho"'),
        document.fonts.load('500 28px "Zen Kaku Gothic New"')
      ]),
      new Promise(r=>setTimeout(r,2000))
    ]);
  }catch(e){}

  const W=1080, H=1350;
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const x=cv.getContext('2d');
  const isH = p===PERSONAS.hiden;
  const DISPLAY='"Shippori Mincho","Hiragino Mincho ProN","Yu Mincho","MS Mincho",serif';
  const BODY='"Zen Kaku Gothic New","Hiragino Kaku Gothic ProN","Meiryo",sans-serif';

  /* ── background ── */
  x.fillStyle='#12100e'; x.fillRect(0,0,W,H);
  const bg=x.createRadialGradient(W/2,0,0,W/2,0,H*.85);
  bg.addColorStop(0,'rgba(200,162,77,.09)'); bg.addColorStop(1,'rgba(0,0,0,0)');
  x.fillStyle=bg; x.fillRect(0,0,W,H);

  /* gold flecks */
  for(let i=0;i<65;i++){
    x.save();
    x.translate((i*173)%W,(i*211)%H);
    x.rotate(i*.72);
    x.fillStyle=i%3?'#c8a24d':'#eccf85';
    x.globalAlpha=.2+((i*37)%50)/160;
    x.fillRect(0,0,3+(i%4)*2,2+(i%3));
    x.restore();
  }
  x.globalAlpha=1;

  /* ── outer + inner frame ── */
  x.strokeStyle=isH?'#eccf85':'#c8a24d'; x.lineWidth=3.5;
  roundRect(x,28,28,W-56,H-56,8); x.stroke();
  x.strokeStyle='rgba(200,162,77,.3)'; x.lineWidth=1;
  roundRect(x,42,42,W-84,H-84,5); x.stroke();

  const spc=v=>{try{x.letterSpacing=v}catch(e){}};

  /* ── category banner ── */
  x.fillStyle='rgba(36,28,16,.9)'; x.fillRect(90,52,W-180,52);
  x.strokeStyle='rgba(200,162,77,.35)'; x.lineWidth=1;
  x.strokeRect(90,52,W-180,52);
  x.fillStyle='#eccf85'; x.textAlign='center'; x.font='600 27px '+DISPLAY; spc('14px');
  x.fillText(p.cat, W/2, 87); spc('0px');

  let sceneY=120;
  if(isH){
    x.fillStyle='rgba(236,207,133,.15)';
    x.fillRect(90,110,W-180,36);
    x.fillStyle='#eccf85'; x.font='500 22px '+DISPLAY; spc('7px');
    x.fillText('✦  秘伝  ·  SECRET CARD  ✦', W/2, 134); spc('0px');
    sceneY=154;
  }

  /* ── scene (drawn natively — no SVG blob) ── */
  const sceneKey=p.sceneKey||'snow';
  const sW=W-180, sH=Math.round(sW*0.526); /* 900:473 ratio */
  x.strokeStyle='#8a6f38'; x.lineWidth=1.5;
  x.strokeRect(89,sceneY-1,sW+2,sH+2);
  drawSceneOnCanvas(x, sceneKey, 90, sceneY, sW, sH);

  /* ── kanji ── */
  const ky=sceneY+sH+160;
  if(isH){
    const halo=x.createRadialGradient(W/2,ky-55,8,W/2,ky-55,210);
    halo.addColorStop(0,'rgba(236,207,133,.32)'); halo.addColorStop(1,'rgba(0,0,0,0)');
    x.fillStyle=halo; x.fillRect(W/2-220,ky-280,440,440);
  }
  x.shadowColor='rgba(200,162,77,.5)'; x.shadowBlur=28;
  x.fillStyle='#eccf85'; x.font='700 160px '+DISPLAY;
  x.fillText(p.kanji, W/2, ky); x.shadowBlur=0;

  /* ── name ── */
  x.fillStyle='#f2e7d2'; x.font='700 50px '+DISPLAY;
  x.fillText(p.name.ja, W/2, ky+78);
  x.fillStyle='#c9bda4'; x.font='500 27px '+DISPLAY; spc('3px');
  x.fillText(p.name.en, W/2, ky+120); spc('0px');

  /* ── fabric band ── */
  const bandY=ky+152, bandH=82;
  x.strokeStyle='#8a6f38'; x.lineWidth=1.5;
  x.strokeRect(89,bandY-1,sW+2,bandH+2);
  const [patKey,patFg,patBg]=p.ori.pat;
  drawPatternOnCanvas(x, patKey, patFg, patBg, 90, bandY, sW, bandH);

  x.fillStyle='#eccf85'; x.font='600 31px '+DISPLAY;
  x.fillText('織  '+FAB[p.kanji], W/2, bandY+bandH+52);

  /* ── taglines ── */
  x.fillStyle='#c9bda4'; x.font='500 27px '+BODY;
  x.fillText('あなたの血に流れる一枚は？', W/2, bandY+bandH+103);
  x.fillStyle='rgba(180,168,148,.8)'; x.font='400 22px '+BODY;
  x.fillText('Which card is in your blood?', W/2, bandY+bandH+138);

  /* ── brand mark + site link ── */
  x.fillStyle='rgba(200,162,77,.22)';
  x.fillRect(44,H-124,W-88,82);
  x.fillStyle='#c8a24d'; x.font='600 24px '+DISPLAY; spc('10px');
  x.fillText('ORI-MOSAIC · 織モザイク', W/2, H-86); spc('0px');
  const siteUrl=location.host?(location.host+location.pathname).replace(/\/index\.html$/,'').replace(/\/$/,''):'';
  if(siteUrl){
    x.fillStyle='rgba(201,189,164,.92)'; x.font='400 21px '+BODY;
    x.fillText(siteUrl, W/2, H-50);
  }

  return cv;
}

/* helper: rounded rectangle path (no native roundRect in older browsers) */
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

/* render once, cache the data URL, reuse for both Save and Share */
async function getCardDataUrl(){
  if(cachedCardDataUrl) return cachedCardDataUrl;
  const cv=await composeCard(currentPersona);
  cachedCardDataUrl=cv.toDataURL('image/jpeg',0.93);
  return cachedCardDataUrl;
}

function setBtn(id, text, disabled){
  const b=document.getElementById(id);
  if(b){ b.textContent=text; b.disabled=disabled; }
}

async function downloadCard(btn){
  if(!currentPersona) return;
  const orig=btn.textContent;
  btn.disabled=true; btn.textContent='仕立て中… · Composing…';
  try{
    const dataUrl=await getCardDataUrl();
    showCardOverlay(dataUrl,'ori-mosaic-'+currentPersona.kanji+'.jpg');
  }catch(e){
    console.error(e);
    alert('画像の生成に失敗しました。\nCould not create the image — please try again.');
  }
  btn.disabled=false; btn.textContent=orig;
}

function showCardOverlay(dataUrl, filename){
  const old=document.getElementById('cardOverlay');
  if(old) old.remove();
  const o=document.createElement('div');
  o.className='overlay'; o.id='cardOverlay';
  /* clicking the backdrop closes it */
  o.addEventListener('click',e=>{ if(e.target===o) o.remove(); });
  o.innerHTML=`
    <img src="${dataUrl}" alt="あなたのOri-Mosaicカード Your result card"
         style="cursor:pointer" title="長押し・右クリックで保存 / Long-press or right-click to save">
    <p class="cap">
      スマホ：画像を長押し → 「写真に保存」<span class="en-sub">Mobile: long-press the image → Save to Photos</span>
      PC：右クリック → 「名前を付けて保存」<span class="en-sub">Desktop: right-click → Save image as…</span>
    </p>
    <div class="row">
      <a class="btn-gold" href="${dataUrl}" download="${filename}">⬇ ダウンロード · Download</a>
      <button class="btn-outline" onclick="document.getElementById('cardOverlay').remove()">閉じる · Close</button>
    </div>`;
  document.body.appendChild(o);
}

async function prewarmCard(){
  /* pre-render the JPEG (and a File for sharing) the moment the result
     appears, so tapping Share/Save later feels instant — mobile share
     sheets only stay "armed" for a moment after your tap. */
  try{
    const dataUrl=await getCardDataUrl();
    cachedCardFile=new File([dataURLtoBlob(dataUrl)],
      'ori-mosaic-'+currentPersona.kanji+'.jpg',{type:'image/jpeg'});
  }catch(e){ console.error('prewarm failed',e); }
}

function showToast(text){
  const t=document.getElementById('toast');
  if(!t) return;
  t.textContent=text;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

async function shareResult(btn){
  if(!currentPersona) return;
  const orig=btn?btn.textContent:null;
  const done=()=>{ if(btn){btn.disabled=false;btn.textContent=orig;} };
  if(btn){ btn.disabled=true; btn.textContent='…'; }

  const link=/^https?:/.test(location.href)?location.href:'';
  const msg=currentPersona.share.ja+'\n'+currentPersona.share.en
    +(link?'\n\n▶ あなたも診断してみる / Try it yourself:\n'+link:'');

  /* 1) best case: one native share sheet carrying BOTH the image and the
        text+link together (most mobile browsers). Note: the OS will show
        its own large image preview before the destination list — that's
        normal share-sheet behaviour, not a stuck screen. */
  if(navigator.share && cachedCardFile && navigator.canShare
     && navigator.canShare({files:[cachedCardFile]})){
    try{
      await navigator.share({files:[cachedCardFile],text:msg,title:'Ori-Mosaic 織モザイク'});
      done(); return;
    }catch(e){
      if(e && e.name==='AbortError'){ done(); return; }
      /* fall through if the OS rejects file-sharing for some reason */
    }
  }

  /* 2) text+link only, via native share (covers most desktop browsers,
        which support Web Share for text/links but not files) */
  if(navigator.share){
    try{
      await navigator.share({title:'Ori-Mosaic 織モザイク',text:msg});
      done(); return;
    }catch(e){
      if(e && e.name==='AbortError'){ done(); return; }
    }
  }

  /* 3) no native share available at all: copy the text+link to the
        clipboard AND pop the image so the person still walks away with
        both pieces — just two quick manual steps instead of one. */
  try{
    await navigator.clipboard.writeText(msg);
    showToast('リンクをコピーしました。画像も表示します · Link copied — here\u2019s the image too ✦');
  }catch(e){
    prompt('結果をコピーしてください · Copy your result:',msg);
  }
  try{
    const dataUrl=await getCardDataUrl();
    showCardOverlay(dataUrl,'ori-mosaic-'+currentPersona.kanji+'.jpg');
  }catch(e){ console.error(e); }
  done();
}

/* ---------- compendium ---------- */
function renderCompendium(){
  document.getElementById('compgrid').innerHTML=COMPENDIUM.map(c=>`
    <div class="comp-card">
      <div class="comp-art">${c.art}</div>
      <div class="comp-body">
        <div class="ck"><span>${c.k}</span>${c.t.ja}</div>
        <p>${dual(c.p)}</p>
      </div>
    </div>`).join('');
}

/* ---------- boot ---------- */
renderStatic();
renderCompendium();
